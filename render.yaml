# Blueprint Render — creează serverul web + baza de date PostgreSQL împreună.
#
# Cum se folosește:
#   1. Urcați acest repo pe GitHub (branch-ul principal).
#   2. Pe https://render.com → New → Blueprint → conectați repo-ul.
#   3. Render citește acest fișier și creează ambele servicii.
#   4. Completați variabilele TWILIO_* (pentru SMS real) în panoul serviciului web.
#
# Regiunea „frankfurt" este cea mai apropiată de România (latență mică).

databases:
  - name: granafarm-db
    databaseName: granafarm
    user: granafarm
    region: frankfurt
    plan: basic-256mb        # ~6 $/lună, cu backup automat. Alternativă de test: „free" (expiră după 30 zile).

services:
  - type: web
    name: granafarm
    runtime: node
    region: frankfurt
    plan: starter            # ~7 $/lună, mereu pornit. Alternativă de test: „free" (adoarme după inactivitate).
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: granafarm-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        generateValue: true   # Render generează o parolă sigură; o vedeți în Environment.
      # --- SMS prin Twilio (completați aceste 3 valori pentru trimitere reală) ---
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false
