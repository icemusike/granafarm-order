<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 392 96" width="392" height="96" role="img" aria-label="GranaFarm">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&amp;display=swap');
      .gf-word { font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif; font-weight: 700; font-size: 56px; letter-spacing: -1.5px; }
    </style>
    <linearGradient id="gfGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFC062"/>
      <stop offset="1" stop-color="#FF9800"/>
    </linearGradient>
    <linearGradient id="gfGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66BB6A"/>
      <stop offset="1" stop-color="#388E3C"/>
    </linearGradient>
  </defs>

  <!-- Wordmark -->
  <text x="4" y="66" class="gf-word">
    <tspan fill="url(#gfGold)">Grana</tspan><tspan fill="url(#gfGreen)">Farm</tspan>
  </text>

  <!-- Emblem: leaf + wheat ear -->
  <g transform="translate(312 6)">
    <!-- leaf -->
    <path d="M26 84 C 2 66 4 30 26 8 C 30 40 40 66 26 84 Z" fill="url(#gfGreen)"/>
    <path d="M26 12 C 22 40 22 64 26 82" stroke="#2E7D32" stroke-width="1.8" fill="none" opacity="0.55"/>
    <!-- wheat ear -->
    <path d="M56 86 L 56 40" stroke="#FF9800" stroke-width="3.4" stroke-linecap="round"/>
    <g fill="url(#gfGold)">
      <path d="M56 30 C 61 36 61 46 56 52 C 51 46 51 36 56 30 Z"/>
      <path d="M55 44 C 47 47 44 55 47 62 C 55 59 58 51 55 44 Z"/>
      <path d="M57 44 C 65 47 68 55 65 62 C 57 59 54 51 57 44 Z"/>
      <path d="M55 58 C 47 61 44 69 47 76 C 55 73 58 65 55 58 Z"/>
      <path d="M57 58 C 65 61 68 69 65 76 C 57 73 54 65 57 58 Z"/>
    </g>
  </g>
</svg>
